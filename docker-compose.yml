services:
  bot:
    build: .
    container_name: invest-portfolio-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./target.yaml:/app/target.yaml:ro
    # Uncomment when TELEGRAM_PROXY_URL is an IPv6 host. Docker bridge network is
    # IPv4-only by default; host networking gives the container the host's IPv6.
    # network_mode: host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
